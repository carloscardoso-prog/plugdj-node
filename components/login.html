<div class="login-box glass">
    <button class="modal-close" type="button" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>

    <div class="login-logo">
        <img src="assets/icons/icon.png" alt="Logo" class="logo-icon" />
    </div>

    <form class="login-form">
        <button class="btn-discord">
            <span class="discord-icon">f</span>
            <span>Plug your Discord</span>
        </button>
    </form>

    <form class="login-form">
        <button class="btn-twitch">
            <span class="twitch-icon">f</span>
            <span>Plug your Twitch</span>
        </button>
    </form>

    <div class="login-divider">
        <hr><span>OR</span><hr>
    </div>

    <h3 class="login-subtitle">Join a Room</h3>

    <form class="login-form">
        <input type="nickname" placeholder="Nickname" class="login-input" />
        <input type="room" placeholder="Room" class="login-input" />
        <button type="submit" class="btn-join">Join</button>
    </form>

    <p class="signup-text">Don't have an room? <a href="#" class="signup-link">Host one now!</a></p>
</div>
