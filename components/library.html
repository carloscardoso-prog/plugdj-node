<div class="panel-inner">
    <div class="panel-header">
        <h2>Library</h2>
        <button class="panel-close" type="button" aria-label="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
    </div>

    <p class="panel-desc">Your personal DJ queue. Paste a link to play it once — tracks clear as you DJ. Empty library = you can't join the waitlist.</p>

    <form class="library-add" data-target="library">
        <input type="url" class="library-input" placeholder="YouTube / SoundCloud / Spotify URL" required>
        <button type="submit" class="btn-add-track">Add</button>
    </form>

    <div class="library-section">
        <h3 class="library-label">Up next <span class="library-count" id="library-count">0</span></h3>
        <ul class="library-list track-list" id="library-list"></ul>
    </div>
</div>
