<div class="panel-inner settings-panel">
    <div class="panel-header">
        <h2>Settings</h2>
        <button class="panel-close" type="button" aria-label="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
    </div>

    <div class="settings-body">
        <nav class="settings-tabs">
            <button class="settings-tab active" data-settings="general">General</button>
            <button class="settings-tab" data-settings="audio">Audio</button>
            <button class="settings-tab" data-settings="chat">Chat</button>
            <button class="settings-tab" data-settings="notifications">Notifications</button>
        </nav>

        <div class="settings-content">
            <div class="settings-section active" data-settings="general">
                <h3>General</h3>
                <label class="setting-row">
                    <span>Display name</span>
                    <input type="text" class="setting-input" id="setting-display-name" maxlength="24" value="Guest">
                </label>
                <label class="setting-row toggle">
                    <span>Show online status</span>
                    <input type="checkbox" id="setting-show-online" checked>
                </label>
                <p class="settings-hint">Hides the live chat headcount for you only. Profile data stays on this device.</p>
            </div>

            <div class="settings-section" data-settings="audio">
                <h3>Audio</h3>
                <label class="setting-row">
                    <span>Master volume</span>
                    <input type="range" class="setting-range" id="setting-master-volume" min="0" max="100" value="70">
                </label>
                <label class="setting-row toggle">
                    <span>Normalize volume</span>
                    <input type="checkbox" id="setting-normalize" checked>
                </label>
                <p class="settings-hint">Master matches the player slider. Normalize keeps tracks at a more even loudness.</p>
            </div>

            <div class="settings-section" data-settings="chat">
                <h3>Chat</h3>
                <label class="setting-row toggle">
                    <span>Show timestamps</span>
                    <input type="checkbox" id="setting-chat-timestamps" checked>
                </label>
                <label class="setting-row toggle">
                    <span>Compact mode</span>
                    <input type="checkbox" id="setting-chat-compact">
                </label>
                <label class="setting-row">
                    <span>Font size</span>
                    <select class="setting-input" id="setting-chat-font">
                        <option value="Small">Small</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="Large">Large</option>
                    </select>
                </label>
            </div>

            <div class="settings-section" data-settings="notifications">
                <h3>Notifications</h3>
                <label class="setting-row toggle">
                    <span>Desktop notifications</span>
                    <input type="checkbox" id="setting-desktop-notifications">
                </label>
                <label class="setting-row toggle">
                    <span>Sound alerts</span>
                    <input type="checkbox" id="setting-sound-alerts" checked>
                </label>
                <label class="setting-row toggle">
                    <span>Notify when it's your turn</span>
                    <input type="checkbox" id="setting-notify-turn" checked>
                </label>
            </div>
        </div>
    </div>
</div>
